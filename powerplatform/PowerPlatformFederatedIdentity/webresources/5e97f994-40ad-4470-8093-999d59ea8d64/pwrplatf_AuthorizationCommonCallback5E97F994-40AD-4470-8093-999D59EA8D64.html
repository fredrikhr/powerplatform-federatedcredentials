<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OpenID Connect Authorization Callback</title>
  </head>
  <body>
    <h1>OpenID Connect</h1>
    <progress id="loading"></progress>

    <output id="result"></output>

    <script>
      async function sendRequest() {
        const queryParams = new URLSearchParams(window.location.search);
        const progressEl = document.getElementById("loading");
        const resultDiv = document.getElementById("result");

        try {
          const response = await fetch(
            "/api/data/v9.2/pwrplatf_DecodeAuthorizationUrlState",
            {
              method: "POST",
              headers: {
                Accept: "application/json",
                "Content-Type": "application/json; charset=utf-8",
                "OData-Version": "4.0",
                "OData-MaxVersion": "4.0",
              },
              body: JSON.stringify({ State: queryParams.get("state") }),
            },
          );

          const stateDecoded = await response.json();
          const oneTimeRedirectUrl = stateDecoded["OneTimeRedirectUrl"];

          const redirectBody = {};
          for (const [key, value] of queryParams.entries()) {
            redirectBody[key] = value;
          }
          const redirectResponse = await fetch(oneTimeRedirectUrl, {
            method: "POST",
            headers: {
              "Content-Type": "application/json; charset=utf-8",
            },
            body: JSON.stringify(redirectBody),
          });

          // Remove progress bar from DOM
          progressEl.remove();

          resultDiv.textContent =
            `Redirected: ${redirectResponse.status} ${redirectResponse.statusText}`;
        } catch (err) {
          progressEl.remove();
          resultDiv.textContent = "Error:\n" + err;
        }
      }

      window.onload = sendRequest;
    </script>
  </body>
</html>
